name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master # ou 'main' selon votre branche par défaut

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18' # Version de Node.js

      - name: Install and Build 🔧
        run: |
          npm install
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages # La branche où sera publié le site
          folder: dist # Le dossier contenant le site construit
